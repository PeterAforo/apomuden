<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="redG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#CE1126"/>
      <stop offset="100%" style="stop-color:#B80F22"/>
    </linearGradient>
    <linearGradient id="yellowG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FCD116"/>
      <stop offset="100%" style="stop-color:#E5BC14"/>
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#006B3F"/>
      <stop offset="100%" style="stop-color:#005A35"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="16" cy="16" r="15" fill="white"/>
  
  <!-- Ghana stripes -->
  <g transform="translate(16, 16) scale(0.8)">
    <!-- Red -->
    <path d="M0 -12 C-8 -12 -12 -10 -12 -6 L-12 -2 L12 -2 L12 -6 C12 -10 8 -12 0 -12Z" fill="url(#redG)"/>
    <!-- Yellow -->
    <rect x="-12" y="-2" width="24" height="8" fill="url(#yellowG)"/>
    <!-- Green -->
    <path d="M-12 6 L-12 8 C-12 11 -8 14 0 14 C8 14 12 11 12 8 L12 6 Z" fill="url(#greenG)"/>
    <!-- Health Plus -->
    <circle cx="0" cy="2" r="5" fill="white"/>
    <rect x="-3.5" y="0.5" width="7" height="3" rx="0.5" fill="#CE1126"/>
    <rect x="-1.5" y="-1.5" width="3" height="7" rx="0.5" fill="#CE1126"/>
  </g>
</svg>
