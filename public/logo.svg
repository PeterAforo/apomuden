<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#CE1126"/>
      <stop offset="100%" style="stop-color:#B80F22"/>
    </linearGradient>
    <linearGradient id="yellowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FCD116"/>
      <stop offset="100%" style="stop-color:#E5BC14"/>
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#006B3F"/>
      <stop offset="100%" style="stop-color:#005A35"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Ghana Map Shape (simplified) -->
  <g filter="url(#shadow)">
    <!-- Red stripe (top) -->
    <path d="M100 20 
             C60 20 35 35 30 55
             L30 75
             L170 75
             L170 55
             C165 35 140 20 100 20Z" 
          fill="url(#redGradient)"/>
    
    <!-- Yellow stripe (middle) -->
    <path d="M30 75
             L30 125
             L170 125
             L170 75
             Z" 
          fill="url(#yellowGradient)"/>
    
    <!-- Green stripe (bottom) -->
    <path d="M30 125
             L30 145
             C35 165 60 180 100 180
             C140 180 165 165 170 145
             L170 125
             Z" 
          fill="url(#greenGradient)"/>
  </g>
  
  <!-- Health Plus Sign (replacing star) - centered in yellow stripe -->
  <g transform="translate(100, 100)">
    <!-- White circle background -->
    <circle cx="0" cy="0" r="28" fill="white" opacity="0.95"/>
    <!-- Red health plus -->
    <rect x="-20" y="-6" width="40" height="12" rx="2" fill="#CE1126"/>
    <rect x="-6" y="-20" width="12" height="40" rx="2" fill="#CE1126"/>
  </g>
  
  <!-- Subtle border/outline for map shape -->
  <path d="M100 20 
           C60 20 35 35 30 55
           L30 145
           C35 165 60 180 100 180
           C140 180 165 165 170 145
           L170 55
           C165 35 140 20 100 20Z" 
        fill="none" 
        stroke="#333" 
        stroke-width="1.5" 
        opacity="0.2"/>
</svg>
